services:
  backend:
    build:
      context: ./backend
    container_name: crossborder-ai-backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: CrossBorder AI Agent
      DATABASE_URL: sqlite:////data/crossborder_ai.db
      AI_PROVIDER: mock
      ZHIPUAI_API_KEY: ""
      ZHIPUAI_MODEL: glm-4-flash
      FEISHU_WEBHOOK_URL: ""
      FEISHU_SECRET: ""
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
    container_name: crossborder-ai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_data:
